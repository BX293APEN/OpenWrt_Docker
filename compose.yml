# docker compose up --build -d  でビルド開始
# docker logs -f Docker_OpenWrt  で進捗確認
# docker compose down            でコンテナ削除

services:
  openwrt:
    env_file: .env
    cpus: ${CPU_CORE}

    container_name: ${CONTAINER_NAME}
    hostname: ${CONTAINER_NAME}

    build:
      context: ${Dockerfile_DIR}
      dockerfile: ${Dockerfile}
      args:
        WS:          ${WS}
        ENTRY_DIR:   ${ENTRY_DIR}
        ENTRY_POINT: ${ENTRY_POINT}

    volumes:
      - ${VOLUME}:/${WS}   # ホスト ./build → コンテナ内 /build

    privileged: true        # mount / losetup に必須
    pid: host

    restart: no             # ビルド完了後に自動再起動しない
    stop_grace_period: 12h  # 長時間ビルドを途中で止めない

    environment:
      # ── ビルド設定 ──
      - OPENWRT_VERSION=${OPENWRT_VERSION}
      - DEVICE_PROFILE=${DEVICE_PROFILE}
      - TARGET=${TARGET}
      - SUBTARGET=${SUBTARGET}
      - PROFILE=${PROFILE}
      - OPENWRT_MIRROR=${OPENWRT_MIRROR}
      - WS=${WS}
      - CPU_CORE=${CPU_CORE}
      # ── ネットワーク設定 ──
      - LAN_IP=${LAN_IP}
      - LAN_NETMASK=${LAN_NETMASK}
      - LAN_GATEWAY=${LAN_GATEWAY}
      - LAN_DNS=${LAN_DNS}
      - WAN_PROTO=${WAN_PROTO}
      - WAN_IP=${WAN_IP}
      - WAN_NETMASK=${WAN_NETMASK}
      - WAN_GATEWAY=${WAN_GATEWAY}
      - PPPOE_USER=${PPPOE_USER}
      - PPPOE_PASS=${PPPOE_PASS}
      # ── ロケール・タイムゾーン ──
      - TIME_ZONE=${TIME_ZONE}
      - OPENWRT_TZ=${OPENWRT_TZ}
      # ── SSH ──
      - SSH_PORT=${SSH_PORT}
      - WAN_SSH=${WAN_SSH}
      - WAN_SSH_ALLOW_IP=${WAN_SSH_ALLOW_IP}
      # ── 認証 ──
      - ROOT_PASSWORD=${ROOT_PASSWORD}

    command:
      - /${ENTRY_DIR}/${ENTRY_POINT}
